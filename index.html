<!DOCTYPE html>
<html lang="lo">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login - App Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Noto Sans Lao', sans-serif;
        }
    </style>
    
    <script>
        // Disable right-click & View Source
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });
        document.addEventListener("keydown", function (e) {
            if (e.ctrlKey && (e.key === "U" || e.key === "u" || e.key === "I" || e.key === "i")) {
                e.preventDefault();
            }
        });

        // ຟັງຊັນກວດສອບການເຂົ້າສູ່ລະບົບ
        function validateLogin(event) {
            event.preventDefault();
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            if (username === "admin" && password === "bol@2024") {
                alert("Login Successful!");
                window.location.href = "index1.html"; 
            } else {
                alert("Invalid Username or Password");
            }
        }

        // ຟັງຊັນ ເປີດ/ປິດ ເບິ່ງລະຫັດຜ່ານ
        function togglePassword() {
            const passwordInput = document.getElementById("password");
            const toggleIcon = document.getElementById("toggleIcon");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleIcon.classList.remove("fa-eye");
                toggleIcon.classList.add("fa-eye-slash");
            } else {
                passwordInput.type = "password";
                toggleIcon.classList.remove("fa-eye-slash");
                toggleIcon.classList.add("fa-eye");
            }
        }
    </script>
</head>

<body class="bg-gradient-to-tr from-slate-100 to-blue-50 flex items-center justify-center h-screen px-4">

    <div class="bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100 transition-all duration-300 hover:shadow-blue-100/50">
        
        <div class="text-center mb-8">
            <div class="inline-block p-3 bg-slate-50 rounded-full shadow-sm mb-3">
                <img src="https://www.bol.gov.la/img/LOGO_BANK_V2.png" alt="Logo" class="h-16 mx-auto object-contain">
            </div>
            <h2 class="text-2xl font-bold text-gray-800 tracking-wide">ເຂົ້າສູ່ລະບົບ App Center</h2>
            <p class="text-sm text-gray-400 mt-1">ກະລຸນາປ້ອນຂໍ້ມູນຂອງທ່ານເພື່ອເຂົ້າໃຊ້ງານ</p>
        </div>

        <form onsubmit="validateLogin(event)" class="space-y-5">
            
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1.5">ຊື່ຜູ້ໃຊ້</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400">
                        <i class="fa-solid fa-user text-sm"></i>
                    </span>
                    <input type="text" id="username" 
                        class="w-full pl-10 pr-4 py-2.5 bg-gray-50/50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100 transition-all text-gray-700" 
                        placeholder="ປ້ອນຊື່ຜູ້ໃຊ້ຂອງທ່ານ" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1.5">ລະຫັດຜ່ານ</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="password" 
                        class="w-full pl-10 pr-11 py-2.5 bg-gray-50/50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100 transition-all text-gray-700" 
                        placeholder="••••••••" required>
                    <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-gray-400 hover:text-gray-600 transition-colors">
                        <i id="toggleIcon" class="fa-solid fa-eye text-sm"></i>
                    </button>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 text-white font-medium py-3 rounded-xl hover:bg-blue-700 active:scale-[0.98] transition-all shadow-lg shadow-blue-600/20 hover:shadow-blue-600/30">
                <i class="fa-solid fa-right-to-bracket mr-2"></i> ເຂົ້າສູ່ລະບົບ
            </button>
            
        </form>

        <div class="mt-6 text-center">
            <p class="text-xs text-gray-400">&copy; 2026 Bank of the Lao PDR. All Rights Reserved.</p>
        </div>
    </div>

</body>
</html>
